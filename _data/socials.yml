# Socials shown on the about page footer (jekyll-socials plugin).
#
# CAVEATS:
# - Only the keys hard-coded in jekyll-socials' SOCIAL_URLS dict are valid
#   built-in keys (e.g. email, scholar_userid, x_username, linkedin_username,
#   github_username, orcid_id, inspirehep_id, cv_pdf, rss_icon, ...). An
#   unrecognised key crashes the plugin.
# - An empty value (`key:`) is read as nil and crashes the plugin. To skip a
#   network, comment the key out entirely.
# - There is no built-in RePEc / IDEAS key; use a custom_social block.
# - X/Twitter uses x_username (not twitter_username).

