# Socials shown on the about page footer (jekyll-socials plugin).
#
# CAVEATS:
# - Only the keys hard-coded in jekyll-socials' SOCIAL_URLS dict are valid
#   built-in keys (e.g. email, scholar_userid, x_username, linkedin_username,
#   github_username, orcid_id, inspirehep_id, cv_pdf, rss_icon, ...). An
#   unrecognised key crashes the plugin.
# - An empty value (`key:`) is read as nil and crashes the plugin. To skip a
#   network, comment the key out entirely.
# - There is no built-in RePEc / IDEAS key; use a custom_social block.
# - X/Twitter uses x_username (not twitter_username).
# - rss_icon: the plugin renders the icon as long as the key exists, regardless
#   of the value. To hide the RSS icon, comment the key out (don't set false).
# - Icon order on the page matches the order in this file. Adjacent entries
#   render side by side.

# CV — local PDF in assets/pdf/.
cv_pdf: /assets/pdf/CV.pdf

email: clodomiro.ferreira@bde.es

# Academic profiles (Scholar + RePEc placed adjacent so they render side by side)
scholar_userid: 76OpcOQAAAAJ
ideas_repec:
  logo: ai ai-ideas-repec
  title: RePEc / IDEAS
  url: https://ideas.repec.org/f/pfe533.html
